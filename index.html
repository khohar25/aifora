<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiforaBook - Temukan Jodoh Bukumu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { aifora: { light: '#f9fafb', dark: '#0f172a' } } } }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">

    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .smooth-scroll { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-aifora-light text-gray-800 dark:bg-slate-900 dark:text-gray-200 transition-colors duration-500 font-sans antialiased overflow-x-hidden">

    <nav class="fixed w-full z-50 backdrop-blur-md bg-white/70 dark:bg-slate-900/70 border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter cursor-pointer text-gray-900 dark:text-white" onclick="closeDetail()">
                Aifora<span class="text-blue-600 dark:text-blue-400">Book.</span>
            </h1>
            <div class="flex items-center gap-2 md:gap-4">
                <button id="lofi-btn" type="button" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                    <i class="ph ph-headphones text-xl"></i>
                </button>
                <button id="wishlist-btn" type="button" class="relative p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                    <i class="ph ph-books text-xl"></i>
                    <span id="wishlist-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <button id="theme-toggle" type="button" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                    <i class="ph ph-moon text-xl dark:hidden"></i>
                    <i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i>
                </button>
                
                <div class="h-6 w-px bg-gray-300 dark:bg-gray-700 mx-1"></div>
                <button onclick="toggleAuthModal()" type="button" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-full transition-colors shadow-sm">
                    <i class="ph-bold ph-user"></i> <span class="hidden md:inline">Masuk</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="home-view" class="block transition-all duration-500">
        <header class="pt-28 pb-6 px-4 max-w-7xl mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                Temukan Jodoh Bukumu.
            </h2>
            <div class="relative max-w-xl mx-auto mb-6">
                <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
                <input type="text" id="search-input" placeholder="Cari judul buku..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white dark:bg-slate-800 border border-gray-200 dark:border-gray-700 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none dark:text-white transition-all">
            </div>
            
            <div class="flex overflow-x-auto hide-scroll smooth-scroll gap-3 pb-2 px-2" id="filter-container">
                <button type="button" class="filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-semibold" data-filter="all">Semua Kategori</button>
            </div>
        </header>

        <div id="viral-banner-container" class="max-w-7xl mx-auto px-4 mb-10 transition-all duration-300">
            <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-white flex items-center gap-2">
                <i class="ph-fill ph-fire text-orange-500"></i> Sedang Trending Hari Ini
            </h3>
            <div id="viral-banner" class="flex overflow-x-auto hide-scroll smooth-scroll snap-x snap-mandatory gap-4 pb-4"></div>
        </div>

        <main class="max-w-7xl mx-auto px-4 pb-20" id="main-content">
            <div id="loading-spinner" class="text-center py-20 text-gray-500 animate-pulse">
                <i class="ph-fill ph-books text-4xl mb-2"></i>
                <p>Menyusun rak buku otomatis...</p>
            </div>
            
            <div id="shelves-container" class="flex flex-col gap-10"></div>
            
            <div id="empty-state" class="hidden text-center py-10"><p class="text-gray-500">Buku tidak ditemukan.</p></div>
        </main>
    </div>

    <div id="detail-view" class="hidden max-w-5xl mx-auto px-4 pt-28 pb-20 transition-all duration-500 fade-in-up"></div>

    <div id="wishlist-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white dark:bg-slate-900 shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex flex-col">
        <div class="p-4 border-b dark:border-gray-800 flex justify-between items-center">
            <h3 class="text-lg font-bold dark:text-white"><i class="ph ph-books text-blue-500"></i> Rak Bukumu</h3>
            <button id="close-wishlist" type="button" class="p-2 dark:text-white hover:bg-gray-100 dark:hover:bg-slate-800 rounded-full"><i class="ph ph-x"></i></button>
        </div>
        <div id="wishlist-items" class="p-4 flex-grow overflow-y-auto flex flex-col gap-4"></div>
    </div>
    <div id="overlay" class="fixed inset-0 bg-black/50 z-[105] hidden opacity-0 transition-opacity"></div>

    <div id="auth-modal" class="fixed inset-0 bg-black/60 z-[120] hidden opacity-0 transition-opacity flex items-center justify-center p-4 glass-effect">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="auth-modal-content">
            <div class="flex justify-between items-center p-6 border-b border-gray-100 dark:border-gray-700">
                <h3 id="modal-title" class="text-2xl font-black text-gray-900 dark:text-white">Masuk Akun</h3>
                <button onclick="toggleAuthModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Username</label>
                        <input type="text" id="auth-username" placeholder="Masukkan username tanpa spasi" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none dark:text-white transition-all" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Password</label>
                        <input type="password" id="auth-password" placeholder="Minimal 6 karakter" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none dark:text-white transition-all" required>
                    </div>
                    
                    <button type="button" id="btn-auth" onclick="handleAuth('login')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors mt-2 shadow-lg hover:shadow-xl">
                        Masuk Sekarang
                    </button>
                </div>
                <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
                    <span id="auth-switch-text">Belum punya akun?</span> 
                    <button type="button" id="auth-switch-btn" onclick="switchAuthMode()" class="text-blue-600 dark:text-blue-400 font-bold hover:underline ml-1">
                        Daftar sekarang
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[100] flex flex-col items-end floating-bot">
        <div id="chat-window" class="bg-white dark:bg-slate-800 w-80 h-96 rounded-2xl shadow-2xl mb-4 flex-col hidden transform scale-95 opacity-0 transition-all duration-300 border border-gray-100 dark:border-gray-700" style="display: none;">
            <div class="p-4 bg-blue-600 text-white rounded-t-2xl font-bold flex justify-between items-center cursor-pointer" onclick="toggleChat(event)">
                <span><i class="ph-fill ph-robot"></i> Pustakawan Aifora</span>
                <i class="ph ph-caret-down"></i>
            </div>
            <div class="p-4 flex-grow overflow-y-auto flex flex-col gap-2 text-sm" id="chat-messages">
                <div class="bg-gray-100 dark:bg-slate-700 dark:text-white p-3 rounded-lg rounded-tl-none self-start max-w-[85%] shadow-sm">
                    Halo! Sebutkan buku atau topik yang sedang kamu cari!
                </div>
            </div>
            <div class="p-3 border-t dark:border-gray-700 flex gap-2">
                <input type="text" id="chat-input" placeholder="Ketik pesan..." class="flex-grow bg-gray-100 dark:bg-slate-900 px-3 py-2 rounded-lg text-sm outline-none dark:text-white" onkeypress="if(event.key === 'Enter') handleChat()">
                <button type="button" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700" onclick="handleChat()">
                    <i class="ph ph-paper-plane-right"></i>
                </button>
            </div>
        </div>
        <button type="button" class="bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition-transform cursor-pointer" onclick="toggleChat(event)">
            <i class="ph-fill ph-chat-teardrop-dots"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
